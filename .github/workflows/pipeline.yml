# .github/workflows/pipeline.yml
# ─────────────────────────────────────────────────────────────────────────────
# PURPOSE: Run the pipeline automatically every 4 hours.
# SCHEDULE: cron runs at minute 0 of every 4th hour (UTC).
# ─────────────────────────────────────────────────────────────────────────────

name: EMA Pipeline

on:
  schedule:
    # Runs at 00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC every day
    - cron: "0 */4 * * *"
  # Allows you to trigger manually from the Actions tab or GitHub API/CLI
  workflow_dispatch:
    inputs:
      task:
        description: "Which job should run?"
        required: true
        default: "pipeline"
        type: choice
        options:
          - pipeline
          - backfill
          - labeler
          - labeller
          - backfill-and-labeller

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt

      - name: Run selected task
        env:
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:        ${{ secrets.SUPABASE_KEY }}
          BINANCE_BASE_URL:    "https://data-api.binance.vision"
          TASK:                ${{ github.event.inputs.task || 'pipeline' }}
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Requested task: ${TASK}"

          case "${TASK}" in
            pipeline|"")
              export RUNTIME_LIMIT_MINUTES="5"
              export API_CALL_LIMIT="200"
              export CANDLE_LIMIT="300"
              python runner.py
              ;;
            backfill)
              export RUNTIME_LIMIT_MINUTES="55"
              export API_CALL_LIMIT="2000"
              export CANDLE_LIMIT="1000"
              python backfill.py
              ;;
            labeler|labeller)
              export RUNTIME_LIMIT_MINUTES="55"
              export API_CALL_LIMIT="2000"
              export CANDLE_LIMIT="500"
              python labeler.py
              ;;
            backfill-and-labeller)
              export RUNTIME_LIMIT_MINUTES="55"
              export API_CALL_LIMIT="2000"
              export CANDLE_LIMIT="1000"
              python backfill.py
              export CANDLE_LIMIT="500"
              python labeler.py
              ;;
            *)
              echo "Unknown task: ${TASK}"
              exit 1
              ;;
          esac
