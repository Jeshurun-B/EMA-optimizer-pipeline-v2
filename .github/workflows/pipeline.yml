# .github/workflows/pipeline.yml
name: EMA Pipeline

on:
  schedule:
    # Runs automatically every 4 hours[cite: 7]
    - cron: "0 */23 * * *"
  workflow_dispatch:
    inputs:
      task:
        description: "Task to run"
        required: true
        default: "pipeline"
        type: choice
        options:
          - pipeline
          - backfill
          - labeler
          - backfill-and-labeller

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60 # Extended for heavy backfilling tasks[cite: 7]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Task
        env:
          # Injected from GitHub Repository Secrets[cite: 2, 7]
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          COINS: ${{ secrets.COINS }}
          TASK: ${{ github.event.inputs.task || 'backfill-and-labeller' }}
        run: |
          case "${TASK}" in
            backfill)
              # High limits for historical processing[cite: 7]
              export API_CALL_LIMIT="2000"
              export CANDLE_LIMIT="1000"
              python backfill.py
              ;;
            labeler)
              export API_CALL_LIMIT="2000"
              python labeler.py
              ;;
            backfill-and-labeller)
              # Sequential run for a full data refresh[cite: 7]
              python backfill.py
              python labeler.py
              ;;
            pipeline|*)
              # Default 15m scanning mode[cite: 7]
              python runner.py
              ;;
          esac
